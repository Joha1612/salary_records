<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <header class="bg-primary text-white py-2">
    <div class="container d-flex align-items-center">
      <button id="sidebarToggle" class="btn btn-light me-3 d-md-none">☰</button>
      <h5 class="mb-0 flex-grow-1 text-center text-md-start">PSMS</h5>
      <button id="logout" class="btn btn-danger">Logout</button>
    </div>
  </header>

  <div class="flex-grow-1 d-flex main">
    <nav id="sidebar" class="bg-white border-end d-none d-md-block" style="width:250px;">
      <div class="p-3">
        <ul class="nav flex-column">
          <li class="nav-item mb-1"><a href="#" class="nav-link px-2" onclick="loadPage('salary_entry.html')">Salary Entry</a></li>
          <li class="nav-item mb-1"><a href="#" class="nav-link px-2" onclick="loadPage('monthly_details.html')">Monthly Details</a></li>
        </ul>
      </div>
    </nav>

    <div class="content flex-grow-1 p-3">
      <!-- iframe kept (script.js may not need iframe, but original used it) -->
      <iframe id="contentFrame" src="salary_entry.html"></iframe>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-2">
    <small>PSMS &copy; 2025 — Devolve By Joha</small>
  </footer>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // minimal behaviors kept; DO NOT change script.js
    function loadPage(page) {
      document.getElementById('contentFrame').src = page;
      // collapse sidebar on mobile
      const sidebar = document.getElementById('sidebar');
      if (window.innerWidth < 768) sidebar.classList.add('d-none');
    }

    // sidebar toggle for small screens
    document.getElementById('sidebarToggle').addEventListener('click', function(){
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    });

    document.getElementById('logout').addEventListener('click', function(){
      window.location.href = 'index.html';
    });

    // resize iframe to fill available height
    function resizeIframe(){
      const headerH = document.querySelector('header').offsetHeight;
      const footerH = document.querySelector('footer').offsetHeight;
      const iframe = document.getElementById('contentFrame');
      iframe.style.height = (window.innerHeight - headerH - footerH - 40) + 'px';
    }
    window.addEventListener('load', resizeIframe);
    window.addEventListener('resize', resizeIframe);
  </script>
</body>
</html>
