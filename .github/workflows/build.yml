name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create package.json
        run: |
          cat > package.json <<EOF
          {
            "name": "psm",
            "version": "1.0.0",
            "private": true
          }
          EOF

      - name: Install Capacitor
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Prepare Web Files
        run: |
          mkdir -p www
          cp *.html www/ || true
          cp *.css www/ || true
          cp *.js www/ || true
          cp *.png www/ || true
          cp *.jpg www/ || true
          cp *.jpeg www/ || true
          cp *.gif www/ || true
          cp -r assets www/assets 2>/dev/null || true

      - name: Create Capacitor Config
        run: |
          cat > capacitor.config.json <<EOF
          {
            "appId": "com.psm.app",
            "appName": "PSM",
            "webDir": "www"
          }
          EOF

      - name: Add Android
        run: |
          npx cap add android

      - name: Sync Android
        run: |
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PSM-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
