<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monthly Details</title>

  <!-- Bootstrap ৫ -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-4">
    <div class="table-container">
      <h2 class="h5 text-center mb-3">Monthly Report</h2>

      <!-- Filter row (IDs preserved) -->
      <div class="row g-3 align-items-end mb-3 filter-section">
        <div class="col-12 col-md-4">
          <label for="filterMonth" class="form-label">Filter By Month</label>
          <select id="filterMonth" name="filterMonth" class="form-select">
            <option value="">Select Month</option>
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
          </select>
        </div>

        <div class="col-12 col-md-4">
          <label for="filterYear" class="form-label">Filter By Year</label>
          <select id="filterYear" name="filterYear" class="form-select">
            <option value="">Select Year</option>
            <option>2024</option><option>2025</option><option>2026</option>
          </select>
        </div>

        <div class="col-12 col-md-4 d-flex gap-2">
          <button type="button" onclick="applyFilters()" class="btn btn-primary filter-btn">Search</button>
          <button type="button" onclick="resetFilters()" class="btn btn-secondary cancel-btn">Cancel</button>
        </div>
      </div>

      <!-- main salary table -->
      <div class="table-responsive">
        <table id="salaryTable" class="table table-bordered">
          <thead class="table-light">
            <tr>
              <th>Date</th>
              <th>Month</th>
              <th>Year</th>
              <th>Paid</th>
              <th>Due</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- action buttons -->
      <div class="d-flex flex-wrap gap-2 mt-3 action-buttons">
        <button onclick="generatePDF()" id="downloadPdfBtn" class="btn btn-danger action-btn pdf-btn">Download PDF</button>
        <button onclick="window.print()" id="printBtn" class="btn btn-success action-btn print-btn">Print</button>
        <button onclick="generateReport()" id="createReportBtn" class="btn btn-primary action-btn create-btn">Create Report</button>
      </div>

      <!-- pagination -->
      <div class="d-flex justify-content-center align-items-center gap-2 mt-3 pagination">
        <button id="prevPage" class="btn btn-outline-primary" onclick="prevPage()" disabled>Previous</button>
        <span id="pageInfo">পৃষ্ঠা 1</span>
        <button id="nextPage" class="btn btn-outline-primary" onclick="nextPage()">Next</button>
      </div>
    </div>

    <!-- Report section -->
    <div class="report-table-container mt-4">
      <h2 class="h5 text-center mb-3">Salary Report</h2>

      <div class="row g-3 align-items-end mb-3 filter-section">
        <div class="col-12 col-md-4">
          <label for="filterType" class="form-label">Filter By Status</label>
          <select id="filterType" name="filterType" class="form-select">
            <option value="">All</option>
            <option value="Paid">Paid</option>
            <option value="Due">Due</option>
          </select>
        </div>

        <div class="col-12 col-md-4">
          <label for="filterYear1" class="form-label">Filter By Year</label>
          <select id="filterYear1" name="filterYear" class="form-select">
            <option value="">Year</option>
            <option>2024</option><option>2025</option><option>2026</option>
          </select>
        </div>

        <div class="col-12 col-md-4 d-flex gap-2">
          <button type="button" onclick="applyFilters1()" class="btn btn-primary submit-btn">Search</button>
          <button type="button" onclick="resetFilters2()" class="btn btn-secondary cancel-btn">Cancel</button>
        </div>
      </div>

      <p id="reportTotalDue" class="fw-bold">Total Due: 0 Taka</p>

      <div class="table-responsive">
        <table id="reportTable" class="table table-bordered">
          <thead class="table-light">
            <tr>
              <th>Month</th>
              <th>Year</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="mt-2">
        <button onclick="generateFilteredReportPDF()" id="downloadReportPdfBtn" class="btn btn-danger action-btn report-pdf-btn">📄 Download PDF</button>
      </div>
    </div>
  </div>

  <!-- hidden totalDue (script.js may reference this) -->
  <input type="hidden" id="totalDue" value="0">

  <!-- include user's script unchanged -->
  <script src="script.js"></script>
  <!-- ===== add this script AFTER script.js is loaded (do not modify script.js) ===== -->
<script>
  (function(){
    // apply color classes to each row based on the 'Due' column value
    function applyRowColors() {
      const tbody = document.querySelector('#salaryTable tbody');
      if (!tbody) return;
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.forEach(row => {
        // remove previous classes
        row.classList.remove('row-due', 'row-paid');

        // find the Due cell — assume it's the last cell in the row
        const cells = row.querySelectorAll('td');
        if (!cells.length) return;
        const dueCell = cells[cells.length - 1];
        if (!dueCell) return;

        // parse numeric value from cell text
        const raw = dueCell.innerText || dueCell.textContent || '';
        const num = parseFloat(raw.replace(/,/g, '').trim()) || 0;

        if (num === 0) {
          row.classList.add('row-paid');
        } else if (num > 0) {
          row.classList.add('row-due');
        }
      });
    }

    // run once on load (if table already filled)
    window.addEventListener('load', function(){
      // tiny timeout to let script.js populate if it runs on load
      setTimeout(applyRowColors, 150);
    });

    // also observe mutations in the table body — this ensures coloring after dynamic changes
    const target = document.querySelector('#salaryTable tbody');
    if (target) {
      const mo = new MutationObserver(function(mutations){
        // small debounce
        if (mo._timer) clearTimeout(mo._timer);
        mo._timer = setTimeout(() => {
          applyRowColors();
        }, 80);
      });
      mo.observe(target, { childList: true, subtree: true, characterData: true });
    } else {
      // if tbody not present yet, wait and then attach observer
      const tryAttach = setInterval(() => {
        const t = document.querySelector('#salaryTable tbody');
        if (t) {
          clearInterval(tryAttach);
          const mo = new MutationObserver(function(){
            if (mo._timer) clearTimeout(mo._timer);
            mo._timer = setTimeout(() => {
              applyRowColors();
            }, 80);
          });
          mo.observe(t, { childList: true, subtree: true, characterData: true });
          // initial apply
          setTimeout(applyRowColors, 120);
        }
      }, 150);
      // safety timeout to stop trying after a while
      setTimeout(() => clearInterval(tryAttach), 8000);
    }

    // also re-apply when page buttons for pagination/filter are clicked (defensive)
    document.addEventListener('click', function(e){
      const el = e.target;
      if (!el) return;
      // if click on any element that looks like prev/next/search/reset
      if (el.id === 'prevPage' || el.id === 'nextPage' || el.id === 'searchBtn' || el.id === 'resetBtn' || el.classList.contains('filter-btn') || el.classList.contains('submit-btn')) {
        // short delay to let script.js update rows
        setTimeout(applyRowColors, 120);
      }
    });
  })();
</script>

  <!-- Bootstrap bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
